<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Supermercado Power</title>
  <link rel="icon" href="logo.png"/>
  <link rel="stylesheet" href="https://cdn.simplecss.org/simple.css">
  <style>
    body {
      background-image: linear-gradient(45deg, darkblue, skyblue);
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
    }

    footer p {
      font-size: 13px;
      color: gold;
    }
  </style>
</head>
<body>

<header>
  <h1>Supermercado Power</h1>
  <button id="idBotonAbrir">Hay una persona adelante</button>
  <button id="idBotonCerrar">Nadie se movió, cerrar puertas</button>
  <button id="idBotonDetener" style="background:red">Detener</button>
</header>

<svg width="100%" height="400px">
  <image
      id="idFondo" x="0" y="0" width="100%" height="100%"
      href="https://images.unsplash.com/photo-1601599561213-832382fd07ba?auto=format&fit=crop&w=800&q=80"
      preserveAspectRatio="xMinYMin slice"
  ></image>
  <rect x="0" y="80%" width="100%" id="idPiso" height="50%"></rect>
  <rect x="0" y="10%" width="200px" id="idParedIzq" fill="green" height="70%"></rect>
  <rect x="600px" y="10%" width="200px" id="idParedDer" fill="green" height="70%"></rect>
  <rect x="200px" y="10%" width="200px" id="idPuertaIzq"
        fill="hsla(200,80%,50%,0.4)" stroke="black" height="70%"></rect>
  <rect x="400px" y="10%" width="200px" id="idPuertaDer"
        fill="hsla(200,80%,50%,0.4)" stroke="black" height="70%"></rect>
</svg>

<footer>
  <p>Supermercado Power 2026 - Gabriela Roldan - Inteligencia Artificial</p>
</footer>

<script>
  var $timer = null;

  // Posiciones de las puertas
  var _posIzq = 200;  // puerta izquierda empieza en x=200
  var _posDer = 400;  // puerta derecha empieza en x=400
  var _anchoMin = 0;  // ancho mínimo (puerta abierta)
  var _anchoMax = 200; // ancho máximo (puerta cerrada)

  // Botones
  idBotonAbrir.onclick   = fnAbrir;
  idBotonCerrar.onclick  = fnCerrar;
  idBotonDetener.onclick = fnDetener;

  // ===== ABRIR: mover puertas hacia afuera =====
  function fnAbrir()
  {
    fnDetener();
    fnMoveOneStep();
  }

  // ===== CERRAR: mover puertas hacia adentro =====
  function fnCerrar()
  {
    fnDetener();
    fnMoveOneStepClose();
  }

  // ===== DETENER =====
  function fnDetener()
  {
    clearTimeout($timer);
    $timer = null;
  }

  // ===== UN PASO DE APERTURA =====
  function fnMoveOneStep()
  {
    var _anchoIzq = parseInt( idPuertaIzq.getAttribute("width") );
    var _anchoDer = parseInt( idPuertaDer.getAttribute("width") );

    if( _anchoIzq <= _anchoMin )
    {
      return; // ya están abiertas
    }

    // Achico el ancho de cada puerta
    _anchoIzq = _anchoIzq - 10;
    _anchoDer = _anchoDer - 10;

    // Muevo la puerta izquierda hacia la izquierda
    _posIzq = _posIzq - 10;

    // Actualizo las puertas
    idPuertaIzq.setAttribute("width", _anchoIzq);
    idPuertaIzq.setAttribute("x", _posIzq);

    idPuertaDer.setAttribute("width", _anchoDer);
    // La puerta derecha se agranda hacia la derecha sola

    $timer = setTimeout(fnMoveOneStep, 30);
  }

  // ===== UN PASO DE CIERRE =====
  function fnMoveOneStepClose()
  {
    var _anchoIzq = parseInt( idPuertaIzq.getAttribute("width") );
    var _anchoDer = parseInt( idPuertaDer.getAttribute("width") );

    if( _anchoIzq >= _anchoMax )
    {
      return; // ya están cerradas
    }

    // Agrando el ancho de cada puerta
    _anchoIzq = _anchoIzq + 10;
    _anchoDer = _anchoDer + 10;

    // Muevo la puerta izquierda hacia la derecha
    _posIzq = _posIzq + 10;

    // Actualizo las puertas
    idPuertaIzq.setAttribute("width", _anchoIzq);
    idPuertaIzq.setAttribute("x", _posIzq);

    idPuertaDer.setAttribute("width", _anchoDer);

    $timer = setTimeout(fnMoveOneStepClose, 30);
  }

  // ============================================================
  // Trabajo realizado por Gabriela Roldan
  // Inteligencia Artificial - 2026
  // ============================================================
</script>

</body>
</html>
